# ──────────────────────────────────────────────────────────────────────────────
# Job Search Terminal — tracked companies (starter list)
# ──────────────────────────────────────────────────────────────────────────────
# This file is the public default. Copy it to portals.yml and customize it for
# your own search. portals.yml is gitignored so your personal list stays local.
#
#   cp config/portals.example.yml config/portals.yml
#
# The scanner reads portals.yml first, and falls back to portals.example.yml if
# portals.yml does not exist. Changes you make in the app (Settings → Job
# Sources) are stored in the database and take precedence over this file.
#
#
# TITLE FILTERS
# ─────────────
# Filter jobs by keyword before they enter your pipeline. Set filters here or
# in the app under Settings → Job Sources (app values take precedence).
# Leave both lists empty to see every open role from every tracked company.
#
# title_filter:
#   positive:           # show jobs matching at least one keyword (empty = all)
#     - "Product"
#     - "Design"
#     - "Engineering"
#     - "Data"
#   negative:           # hide jobs matching any keyword
#     - "Intern"
#     - "Junior"
#
#
# ADDING COMPANIES
# ────────────────
# Each entry needs a name and a careers_url. Ashby and Lever are auto-detected
# from the URL. For Greenhouse you can supply the api field directly (faster).
#
#   Ashby:       careers_url: https://jobs.ashbyhq.com/SLUG
#   Lever:       careers_url: https://jobs.lever.co/SLUG
#   Greenhouse:  careers_url: https://job-boards.greenhouse.io/SLUG
#                api: https://boards-api.greenhouse.io/v1/boards/SLUG/jobs
#
# Set enabled: false to skip a company without removing it.
# ──────────────────────────────────────────────────────────────────────────────

title_filter:
  positive: []    # empty = show all jobs; add keywords to narrow by discipline
  negative: []    # add keywords to hide irrelevant roles (e.g. "Intern", "Junior")

