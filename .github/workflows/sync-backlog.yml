name: Sync backlog to GitHub Issues

on:
  push:
    branches: [main]
    paths:
      - docs/backlog.md
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync backlog.md to GitHub Issues
        run: node scripts/sync-backlog.js
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
